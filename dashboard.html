<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>차량 관제 대시보드</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        header { background: #1a1a2e; color: #fff; padding: 12px 20px; font-size: 18px; font-weight: bold; }
        .container { display: flex; flex: 1; overflow: hidden; }

        .sidebar { width: 300px; background: #f5f5f5; border-right: 1px solid #ddd; display: flex; flex-direction: column; overflow: hidden; }
        .sidebar-section { display: flex; flex-direction: column; flex: 1; overflow: hidden; border-bottom: 1px solid #ddd; }
        .sidebar-section:last-child { border-bottom: none; }
        .sidebar-section h3 { padding: 10px 14px; background: #e8e8e8; border-bottom: 1px solid #ddd; font-size: 13px; color: #333; flex-shrink: 0; }
        .sidebar-list { flex: 1; overflow-y: auto; padding: 6px; }

        .vehicle-item { padding: 10px 12px; margin-bottom: 5px; background: #fff; border-radius: 6px; border: 1px solid #e0e0e0; cursor: pointer; }
        .vehicle-item:hover { background: #e3f2fd; }
        .vehicle-item.selected { background: #bbdefb; border-color: #42a5f5; }
        .vehicle-item .plate { font-weight: bold; font-size: 14px; }
        .vehicle-item .info { font-size: 11px; color: #666; margin-top: 3px; }
        .status { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 11px; color: #fff; }
        .status-AVAILABLE { background: #4caf50; }
        .status-ON_TRIP { background: #ff9800; }
        .status-OFFLINE { background: #9e9e9e; }

        .journey-item { padding: 8px 10px; margin-bottom: 5px; background: #fff; border-radius: 6px; border: 1px solid #e0e0e0; cursor: pointer; }
        .journey-item:hover { background: #f3e5f5; }
        .journey-item.selected { background: #e1bee7; border-color: #ab47bc; }
        .journey-item .j-status { font-size: 11px; font-weight: bold; }
        .journey-item .j-time { font-size: 11px; color: #666; margin-top: 3px; }
        .j-status-IN_PROGRESS { color: #ff9800; }
        .j-status-COMPLETED { color: #4caf50; }
        .j-status-SCHEDULED { color: #9e9e9e; }

        #map { flex: 1; }
        .controls { background: #1a1a2e; padding: 10px 20px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .controls button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500; }
        .btn-register { background: #4caf50; color: #fff; }
        .btn-simulator { background: #2196f3; color: #fff; }
        .btn-refresh { background: #78909c; color: #fff; }
        .controls button:hover { opacity: 0.85; }
        #log { background: #263238; color: #a5d6a7; padding: 8px 20px; font-size: 12px; font-family: monospace; max-height: 60px; overflow-y: auto; }

        .empty-hint { padding: 16px; font-size: 12px; color: #999; text-align: center; }
    </style>
</head>
<body>
    <header>🚗 차량 관제 대시보드</header>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-section" style="flex: 1;">
                <h3>등록 차량</h3>
                <div id="vehicle-list" class="sidebar-list"></div>
            </div>
            <div class="sidebar-section" style="flex: 1.5;">
                <h3>운행 이력 <span id="journey-vehicle-label" style="font-weight:normal; color:#666;"></span></h3>
                <div id="journey-list" class="sidebar-list">
                    <div class="empty-hint">차량을 선택하면 운행 이력이 표시됩니다.</div>
                </div>
            </div>
        </div>
        <div id="map"></div>
    </div>
    <div class="controls">
        <button class="btn-register" onclick="registerVehicle()">차량 등록</button>
        <button class="btn-simulator" onclick="startSimulator()">시뮬레이터 시작</button>
        <button class="btn-refresh" onclick="refresh()">새로고침</button>
    </div>
    <div id="log">로그: 대시보드 시작됨</div>

    <script>
        const API = 'http://localhost:8081/api/cartracking';
        let map, markers = {}, routeLine = null;
        let selectedVehicleId = null, selectedJourneyId = null;

        map = L.map('map').setView([37.5665, 126.9780], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        function log(msg) {
            document.getElementById('log').textContent = `로그: ${msg}`;
        }

        async function api(method, path, body) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(API + path, opts);
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'API 오류');
            return data;
        }

        async function refresh() {
            try {
                const vehicles = await api('GET', '/vehicles');
                renderVehicleList(vehicles);
                updateMarkers(vehicles);
                if (selectedVehicleId) await loadJourneys(selectedVehicleId);
                log(`차량 ${vehicles.length}대 조회 완료`);
            } catch (e) {
                log(`오류: ${e.message}`);
            }
        }

        function renderVehicleList(vehicles) {
            const list = document.getElementById('vehicle-list');
            if (vehicles.length === 0) {
                list.innerHTML = '<div class="empty-hint">등록된 차량이 없습니다.</div>';
                return;
            }
            list.innerHTML = vehicles.map(v => `
                <div class="vehicle-item ${v.id === selectedVehicleId ? 'selected' : ''}"
                     onclick="selectVehicle(${v.id}, '${v.plateNumber}')">
                    <div class="plate">${v.plateNumber}</div>
                    <div class="info">${v.type} · ID: ${v.id}</div>
                    <span class="status status-${v.status}">${v.status}</span>
                </div>
            `).join('');
        }

        function updateMarkers(vehicles) {
            Object.values(markers).forEach(m => map.removeLayer(m));
            markers = {};
            vehicles.forEach(v => {
                if (!v.location) return;
                const lat = parseFloat(v.location.latitude);
                const lng = parseFloat(v.location.longitude);
                if (isNaN(lat) || isNaN(lng)) return;
                markers[v.id] = L.marker([lat, lng])
                    .addTo(map)
                    .bindPopup(`<b>${v.plateNumber}</b><br>${v.type} · ${v.status}`);
            });
        }

        async function selectVehicle(id, plate) {
            selectedVehicleId = id;
            selectedJourneyId = null;
            document.getElementById('journey-vehicle-label').textContent = `— ${plate}`;
            await refresh();
            if (markers[id]) {
                map.setView(markers[id].getLatLng(), 15);
                markers[id].openPopup();
            }
        }

        async function loadJourneys(vehicleId) {
            try {
                const journeys = await api('GET', `/vehicles/${vehicleId}/journeys`);
                renderJourneyList(journeys);
            } catch (e) {
                document.getElementById('journey-list').innerHTML =
                    `<div class="empty-hint">운행 이력 조회 실패: ${e.message}</div>`;
            }
        }

        function renderJourneyList(journeys) {
            const list = document.getElementById('journey-list');
            if (journeys.length === 0) {
                list.innerHTML = '<div class="empty-hint">운행 이력이 없습니다.</div>';
                return;
            }
            list.innerHTML = journeys.map(j => {
                const start = j.startedAt ? new Date(j.startedAt).toLocaleTimeString('ko-KR') : '-';
                const end = j.arrivedAt ? new Date(j.arrivedAt).toLocaleTimeString('ko-KR') : '진행 중';
                return `
                    <div class="journey-item ${j.id === selectedJourneyId ? 'selected' : ''}"
                         onclick="selectJourney(${j.id})">
                        <div class="j-status j-status-${j.status}">${j.status} · #${j.id}</div>
                        <div class="j-time">출발: ${start}</div>
                        <div class="j-time">도착: ${end}</div>
                    </div>
                `;
            }).join('');
        }

        async function selectJourney(journeyId) {
            selectedJourneyId = journeyId;
            try {
                const snapshots = await api('GET', `/journeys/${journeyId}/route`);
                if (routeLine) map.removeLayer(routeLine);

                if (snapshots.length === 0) {
                    log(`운행 #${journeyId} — 기록된 위치 없음`);
                    await loadJourneys(selectedVehicleId);
                    return;
                }

                const latlngs = snapshots.map(s => [
                    parseFloat(s.location.latitude),
                    parseFloat(s.location.longitude)
                ]);
                routeLine = L.polyline(latlngs, { color: '#9c27b0', weight: 4, opacity: 0.8 }).addTo(map);
                map.fitBounds(routeLine.getBounds(), { padding: [40, 40] });
                log(`운행 #${journeyId} 경로 표시 — ${snapshots.length}개 포인트`);
                await loadJourneys(selectedVehicleId);
            } catch (e) {
                log(`경로 조회 오류: ${e.message}`);
            }
        }

        async function registerVehicle() {
            const plates = ['서울12가', '경기34나', '인천56다', '부산78라'];
            const types = ['SEDAN', 'SUV', 'VAN'];
            const plate = plates[Math.floor(Math.random() * plates.length)] + Math.floor(Math.random() * 9000 + 1000);
            const type = types[Math.floor(Math.random() * types.length)];
            const homeLat = 37.5665 + (Math.random() - 0.5) * 0.05;
            const homeLng = 126.9780 + (Math.random() - 0.5) * 0.05;
            try {
                const result = await api('POST', '/vehicles', { plateNumber: plate, type, homeLat, homeLng });
                log(`차량 등록 완료: ${plate} (ID: ${result.id})`);
                refresh();
            } catch (e) {
                log(`등록 오류: ${e.message}`);
            }
        }

        async function startSimulator() {
            try {
                await api('POST', '/simulator/start');
                log('시뮬레이터 시작 — GPS 수신 대기 중');
            } catch (e) {
                log(`시뮬레이터 오류: ${e.message}`);
            }
        }

        refresh();
    </script>
</body>
</html>
