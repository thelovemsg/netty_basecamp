status = info
name= NettyBasecampApplication

# Log files location
property.basePath = c:/work/logs
property.projectName = NettyBasecamp

# Console Appender ??
appender.console.type = Console
appender.console.name = consoleLogger
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} %level [%t] - %msg%n

# RollingFileAppender name, pattern, path and rollover policy
appender.rolling.type = RollingFile
appender.rolling.name = fileLogger
appender.rolling.fileName = ${basePath}/${projectName}.log
appender.rolling.filePattern = ${basePath}/${projectName}_%d{yyyy-MM-dd}-%i.log.gz
appender.rolling.layout.type = PatternLayout
appender.rolling.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} %level [%t] [%l] - %msg%n
appender.rolling.policies.type = Policies

# RollingFileAppender rotation policy
appender.rolling.policies.size.type = SizeBasedTriggeringPolicy
appender.rolling.policies.size.size = 10MB
appender.rolling.policies.time.type = TimeBasedTriggeringPolicy
appender.rolling.policies.time.interval = 1
appender.rolling.policies.time.modulate = true
appender.rolling.strategy.type = DefaultRolloverStrategy
appender.rolling.strategy.delete.type = Delete
appender.rolling.strategy.delete.basePath = ${basePath}
appender.rolling.strategy.delete.maxDepth = 10
appender.rolling.strategy.delete.ifLastModified.type = IfLastModified

# Delete all files older than 30 days
appender.rolling.strategy.delete.ifLastModified.age = 30d

# Performance measurement appender — 마이크로초 타임스탬프, PERF 로그만 별도 파일
appender.perf.type = RollingFile
appender.perf.name = perfLogger
appender.perf.fileName = ${basePath}/${projectName}_perf.log
appender.perf.filePattern = ${basePath}/${projectName}_perf_%d{yyyy-MM-dd}-%i.log.gz
appender.perf.layout.type = PatternLayout
appender.perf.layout.pattern = %d{HH:mm:ss.SSSSSS} [%t] %msg%n
appender.perf.policies.type = Policies
appender.perf.policies.size.type = SizeBasedTriggeringPolicy
appender.perf.policies.size.size = 50MB
appender.perf.policies.time.type = TimeBasedTriggeringPolicy
appender.perf.policies.time.interval = 1
appender.perf.policies.time.modulate = true

# PERF logger — 부하 테스트 시 debug로 켜고, 평소에는 off
logger.perf.name = perf
logger.perf.level = off
logger.perf.additivity = false
logger.perf.appenderRef.perf.ref = perfLogger

# Configure root logger
rootLogger.type = AsyncRoot
rootLogger.level = debug
rootLogger.appenderRef.rolling.ref = fileLogger
rootLogger.appenderRef.console.ref = consoleLogger